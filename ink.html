<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Welcome | 个人主页</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/haodai888/static@main/favicon/link.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fefcf5 0%, #f5f3ff 40%, #eef2ff 100%);
      font-family: system-ui, -apple-system, 'Segoe UI', 'SF Pro Text', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }
    .bubble-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .rainbow-bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.45;
      will-change: transform;
      animation: floatBubble 18s infinite alternate ease-in-out;
      background: radial-gradient(circle at 30% 35%, rgba(255, 245, 220, 0.7), rgba(255, 200, 180, 0.4));
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), inset 0 1px 3px rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(1px);
    }
    .bubble-1 { width: 140px; height: 140px; top: 10%; left: -30px; background: radial-gradient(circle at 35% 30%, rgba(255, 190, 130, 0.65), rgba(255, 120, 160, 0.35)); animation-duration: 22s; animation-delay: 0s; }
    .bubble-2 { width: 90px; height: 90px; bottom: 15%; right: 8%; background: radial-gradient(circle at 40% 35%, rgba(170, 220, 250, 0.7), rgba(100, 180, 240, 0.35)); animation-duration: 19s; animation-delay: -2s; }
    .bubble-3 { width: 200px; height: 200px; top: 55%; left: -60px; background: radial-gradient(circle at 25% 40%, rgba(210, 180, 250, 0.6), rgba(150, 100, 230, 0.3)); animation-duration: 26s; animation-delay: -5s; }
    .bubble-4 { width: 70px; height: 70px; top: 20%; right: 12%; background: radial-gradient(circle at 30% 30%, rgba(255, 240, 150, 0.7), rgba(255, 200, 80, 0.45)); animation-duration: 16s; animation-delay: -1s; }
    .bubble-5 { width: 180px; height: 180px; bottom: 5%; left: 15%; background: radial-gradient(circle at 45% 35%, rgba(250, 180, 200, 0.6), rgba(255, 100, 140, 0.3)); animation-duration: 28s; animation-delay: -8s; }
    .bubble-6 { width: 110px; height: 110px; top: 70%; right: 20%; background: radial-gradient(circle at 30% 40%, rgba(180, 230, 200, 0.7), rgba(80, 200, 130, 0.4)); animation-duration: 21s; animation-delay: -3s; }
    .bubble-7 { width: 55px; height: 55px; top: 8%; left: 45%; background: radial-gradient(circle at 50% 50%, rgba(255, 210, 150, 0.8), rgba(255, 160, 90, 0.5)); animation-duration: 15s; animation-delay: -6s; }
    .bubble-8 { width: 250px; height: 250px; bottom: -80px; right: -50px; background: radial-gradient(circle at 40% 45%, rgba(130, 200, 255, 0.5), rgba(70, 130, 240, 0.25)); animation-duration: 32s; animation-delay: -10s; }
    .bubble-9 { width: 80px; height: 80px; top: 45%; left: 75%; background: radial-gradient(circle at 30% 35%, rgba(245, 200, 230, 0.7), rgba(220, 120, 190, 0.4)); animation-duration: 20s; animation-delay: -4s; }
    .bubble-10 { width: 130px; height: 130px; top: 80%; left: 50%; background: radial-gradient(circle at 35% 30%, rgba(255, 215, 140, 0.65), rgba(255, 140, 80, 0.35)); animation-duration: 24s; animation-delay: -7s; }
    .bubble-11 { width: 65px; height: 65px; top: 12%; right: 30%; background: radial-gradient(circle at 45% 40%, rgba(160, 220, 210, 0.7), rgba(70, 180, 160, 0.45)); animation-duration: 17s; animation-delay: -2.5s; }
    .bubble-12 { width: 160px; height: 160px; bottom: 30%; left: -20px; background: radial-gradient(circle at 25% 30%, rgba(250, 190, 160, 0.6), rgba(230, 110, 100, 0.3)); animation-duration: 27s; animation-delay: -9s; }
    
    @keyframes floatBubble {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      30% {
        transform: translate(18px, -15px) rotate(4deg) scale(1.02);
      }
      70% {
        transform: translate(-12px, 22px) rotate(-2deg) scale(0.98);
      }
      100% {
        transform: translate(10px, 10px) rotate(2deg) scale(1.05);
      }
    }
    
    .guide-card {
      position: relative;
      z-index: 15;
      max-width: 520px;
      width: 90%;
      margin: 24px auto;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      border-radius: 56px;
      border: 1px solid rgba(160, 174, 222, 0.5);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15), 0 0 0 0.5px rgba(255, 255, 255, 0.7) inset;
      transition: all 0.4s ease;
      animation: fadeSlideUp 0.65s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(32px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .content-wrap {
      padding: 34px 28px 40px;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, #1e2a4a, #2d3a6e, #1e3a5f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
      margin-top: 4px;
    }
    .sub {
      text-align: center;
      color: #4b5568;
      font-weight: 500;
      font-size: 0.85rem;
      border-bottom: 1px dashed rgba(37, 99, 235, 0.3);
      display: inline-block;
      width: auto;
      margin: 0 auto 24px;
      padding-bottom: 6px;
    }
    .step-container {
      background: rgba(248, 250, 252, 0.75);
      border-radius: 44px;
      padding: 22px 24px;
      margin: 20px 0 24px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: 0 6px 12px -8px rgba(0, 0, 0, 0.05);
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 26px;
    }
    .step-item:last-child {
      margin-bottom: 0;
    }
    .step-number {
      width: 44px;
      height: 44px;
      background: linear-gradient(125deg, #f1f5f9, #e6edf5);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.4rem;
      color: #2563eb;
      border: 1px solid #cbd5e1;
      box-shadow: 0 8px 14px -8px rgba(0, 0, 0, 0.08);
    }
    .step-text {
      flex: 1;
      font-weight: 520;
      font-size: 1rem;
      color: #1e293b;
      letter-spacing: -0.2px;
    }
    .step-text strong {
      color: #eab308;
      font-weight: 700;
      background: rgba(234, 179, 8, 0.12);
      padding: 2px 8px;
      border-radius: 30px;
      display: inline-block;
    }
    .link-preview {
      background: #f1f5f9;
      padding: 14px 16px;
      border-radius: 32px;
      margin: 18px 0 20px;
      border: 1px solid #e2e8f0;
      word-break: break-all;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      color: #1f2a44;
      text-align: center;
      box-shadow: inset 0 1px 2px #00000008, 0 2px 5px rgba(0,0,0,0.02);
    }
    .copy-btn {
      background: linear-gradient(105deg, #2563eb, #4f46e5);
      width: 100%;
      border: none;
      padding: 16px 0;
      border-radius: 56px;
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 12px 22px -12px #3b82f6;
      margin-top: 10px;
    }
    .copy-btn:active {
      transform: scale(0.97);
      background: linear-gradient(105deg, #1d4ed8, #4338ca);
    }
    .copy-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .toast-msg {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293bdb;
      backdrop-filter: blur(20px);
      padding: 12px 24px;
      border-radius: 60px;
      color: white;
      font-weight: 500;
      font-size: 0.85rem;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      border: 1px solid rgba(59,130,246,0.5);
      white-space: nowrap;
      font-family: system-ui;
    }
    .toast-show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .guide-footer {
      text-align: center;
      font-size: 0.65rem;
      color: #6c7a91;
      margin-top: 32px;
      letter-spacing: 0.3px;
    }
    @media (max-width: 480px) {
      .content-wrap {
        padding: 26px 18px 34px;
      }
      h1 {
        font-size: 1.6rem;
      }
      .step-text {
        font-size: 0.85rem;
      }
      .step-number {
        width: 38px;
        height: 38px;
        font-size: 1.2rem;
      }
      .copy-btn {
        padding: 14px 0;
        font-size: 1rem;
      }
      .step-container {
        padding: 18px 18px;
      }
      .rainbow-bubble {
        opacity: 0.4;
      }
    }
  </style>
</head>
<body>
<div class="bubble-field">
  <div class="rainbow-bubble bubble-1"></div>
  <div class="rainbow-bubble bubble-2"></div>
  <div class="rainbow-bubble bubble-3"></div>
  <div class="rainbow-bubble bubble-4"></div>
  <div class="rainbow-bubble bubble-5"></div>
  <div class="rainbow-bubble bubble-6"></div>
  <div class="rainbow-bubble bubble-7"></div>
  <div class="rainbow-bubble bubble-8"></div>
  <div class="rainbow-bubble bubble-9"></div>
  <div class="rainbow-bubble bubble-10"></div>
  <div class="rainbow-bubble bubble-11"></div>
  <div class="rainbow-bubble bubble-12"></div>
</div>

<div id="guideRoot" class="guide-card" style="display: none;">
  <div class="content-wrap">
    <h1>我的 · 个人主页</h1>
    <div style="text-align: center;">
      <span class="sub"><i class="fa fa-shield"></i> 环境安全检测 · 极速引导</span>
    </div>

    <div class="step-container">
      <div class="step-item">
        <div class="step-number">1</div>
        <div class="step-text"><i class="fa fa-ellipsis-h"></i> 点击右上角 <strong>···</strong> 菜单</div>
      </div>
      <div class="step-item">
        <div class="step-number">2</div>
        <div class="step-text"><i class="fa fa-chrome"></i> 选择 <strong>“在浏览器中打开”</strong></div>
      </div>
      <div class="step-item">
        <div class="step-number">3</div>
        <div class="step-text"><i class="fa fa-link"></i>或点击下方按钮复制链接，在浏览器中打开</div>
      </div>
    </div>

    <div class="link-preview" id="previewLink">
      🌐 目标链接已就绪
    </div>

    <button class="copy-btn" id="copyLinkBtn">
      <i class="fa fa-copy"></i> 复制链接
    </button>

    <div class="guide-footer">
      <i class="fa fa-lock"></i> ICP备案号 ： 蜀ICP备12014994号-1
    </div>
  </div>
</div>

<div id="toastMsg" class="toast-msg">已复制，前往浏览器粘贴访问即可</div>

<script type="text/javascript" src="https://js.users.51.la/21988875.js"></script>
<script>
  (function() {
    function getQueryParam(param) {
      var urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }
    
    function base64Decode(str) {
      try {
        return decodeURIComponent(escape(atob(str)));
      } catch(e) {
        return null;
      }
    }
    
    function isValidHttpUrl(urlString) {
      try {
        var url = new URL(urlString);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch(e) {
        return false;
      }
    }
    
    function showToast(message, isError) {
      var toast = document.getElementById('toastMsg');
      if (!toast) return;
      toast.textContent = message || (isError ? '操作失败' : '链接已复制');
      toast.classList.add('toast-show');
      setTimeout(function() {
        toast.classList.remove('toast-show');
      }, 2200);
    }
    
    function copyToClipboard(text) {
      if (!text) return false;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          showToast('链接已复制，打开浏览器粘贴访问即可', false);
        }).catch(function() {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }
    
    function fallbackCopy(text) {
      var textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast('复制成功，快去浏览器打开', false);
      } catch (err) {
        showToast('复制失败', true);
      }
      document.body.removeChild(textarea);
    }
    
    var encodedParam = getQueryParam('c');
    var targetUrl = null;
    if (encodedParam) {
      targetUrl = base64Decode(encodedParam);
      if (targetUrl && !isValidHttpUrl(targetUrl)) {
        targetUrl = null;
      }
    }
    
    var userAgent = navigator.userAgent || '';
    var isWechat = /MicroMessenger/i.test(userAgent);
    var isQQ = /QQ\//i.test(userAgent);
    var isBlockedEnv = isWechat || isQQ;
    
    var guideContainer = document.getElementById('guideRoot');
    var previewSpan = document.getElementById('previewLink');
    var copyBtn = document.getElementById('copyLinkBtn');
    
    if (!isBlockedEnv && targetUrl && targetUrl.length > 0) {
      window.location.replace(targetUrl);
      return;
    }
    
    if (guideContainer) guideContainer.style.display = 'block';
    
    if (!targetUrl) {
      if (previewSpan) {
        previewSpan.innerHTML = '<i class="fa fa-link" style="margin-right: 6px;"></i>';
      }
      if (copyBtn) {
        copyBtn.disabled = true;
        copyBtn.style.opacity = '0.5';
        copyBtn.style.cursor = 'not-allowed';
        copyBtn.onclick = null;
      }
    } else {
      if (previewSpan) {
        var displayUrl = targetUrl.length > 55 ? targetUrl.substring(0, 52) + '...' : targetUrl;
        previewSpan.innerHTML = '<i class="fa fa-link" style="margin-right: 6px;"></i>' + displayUrl;
      }
      if (copyBtn) {
        copyBtn.disabled = false;
        copyBtn.style.opacity = '1';
        copyBtn.style.cursor = 'pointer';
        copyBtn.onclick = function(e) {
          e.preventDefault();
          copyToClipboard(targetUrl);
        };
      }
    }

    if (isBlockedEnv && targetUrl) {
      console.log('安全环境引导模式 | 请手动跳转浏览器');
    }
    
    var styleNode = document.createElement('style');
    styleNode.textContent = `
      .copy-btn:active { transform: scale(0.97); }
      .step-item { animation: fadeSlide 0.45s ease backwards; }
      .step-item:nth-child(1) { animation-delay: 0.1s; }
      .step-item:nth-child(2) { animation-delay: 0.2s; }
      .step-item:nth-child(3) { animation-delay: 0.3s; }
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateX(-12px); }
        to { opacity: 1; transform: translateX(0); }
      }
    `;
    document.head.appendChild(styleNode);
  })();
</script>
</body>
</html>
