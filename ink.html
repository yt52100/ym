<html lang="zh-CN">
<head>
  <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0" name="viewport">
  <meta content="yes" name="apple-mobile-web-app-capable">
  <meta content="yes" name="apple-touch-fullscreen">
  <meta content="black" name="apple-mobile-web-app-status-bar-style">
  <meta content="320" name="MobileOptimized">
  <style>
    .container {
      width: 100px;
      height: 100px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: rotate-move 2s ease-in-out infinite;
    }
    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background-color: #000;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      margin: auto;
    }
    .dot-3 {
      background-color: #f74d75;
      animation: dot-3-move 2s ease infinite;
    }
    .dot-2 {
      background-color: #10beae;
      animation: dot-2-move 2s ease infinite;
    }
    .dot-1 {
      background-color: #ffe386;
      animation: dot-1-move 2s ease infinite;
    }
    @keyframes dot-3-move {
      20% { transform: scale(1); }
      45% { transform: translateY(-18px) scale(.45); }
      60% { transform: translateY(-25px) scale(.45); }
      80% { transform: translateY(-25px) scale(.45); }
      100% { transform: translateY(0px) scale(1); }
    }
    @keyframes dot-2-move {
      20% { transform: scale(1); }
      45% { transform: translate(-16px, 12px) scale(.45); }
      60% { transform: translate(-20px, 15px) scale(.45); }
      80% { transform: translate(-20px, 15px) scale(.45); }
      100% { transform: translateY(0px) scale(1); }
    }
    @keyframes dot-1-move {
      20% { transform: scale(1); }
      45% { transform: translate(16px, 12px) scale(.45); }
      60% { transform: translate(20px, 15px) scale(.45); }
      80% { transform: translate(20px, 15px) scale(.45); }
      100% { transform: translateY(0px) scale(1); }
    }
    @keyframes rotate-move {
      55% { transform: translate(-50%, -50%) rotate(0deg); }
      80% { transform: translate(-50%, -50%) rotate(360deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .content {
      height: 100%;
      width: 100%;
      position: fixed;
      left: -2px;
      top: -2px;
    }
    body {
      background: #f5f7fa;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
  </div>

  <script type="text/javascript" src="https://js.users.51.la/21988875.js"></script>
  <script>
    // 获取目标网址参数
    var urlParams = new URLSearchParams(window.location.search);
    var encodedParam = urlParams.get('c');
    var tureurl = atob(encodedParam);
    // 检查目标网址是否有效
    if (tureurl.includes("http")) {
      // 判断是否为微信内置浏览器
      var isWechat = /MicroMessenger/i.test(navigator.userAgent);
      if (isWechat) {
        // 微信环境：使用 iframe 嵌入，实现防红
        var iframeHtml = '<iframe class="content" src="' + tureurl + '"></iframe>';
        document.writeln(iframeHtml);
      } else {
        // 非微信环境：直接跳转，地址栏变为目标网址，实现显性转发
        window.location.replace(tureurl);
      }
    } else {
      console.log("无效的网址参数");
    }
  </script>
</body>
</html>
